<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Running Metrics Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0A0A0A;
      --surface1: #141414;
      --surface2: #1E1E1E;
      --surface3: #282828;
      --border:   #2A2A2A;
      --green:    #00FF87;
      --red:      #FF4757;
      --white:    #FFFFFF;
      --dim:      #888888;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface1);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .header-left h1 span { color: var(--green); }
    .last-updated { font-size: 11px; color: var(--dim); margin-top: 2px; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .btn {
      padding: 8px 16px; border-radius: 8px; border: none;
      cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--green); color: #000; }
    .btn-ghost   { background: transparent; color: var(--dim); border: 1px solid var(--border); }

    .poll-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--dim); }
    .poll-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); transition: background 0.3s; }
    .poll-dot.active { background: var(--green); animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    main { padding: 24px; max-width: 1100px; margin: 0 auto; }

    .banner {
      display: none; padding: 14px 18px; border-radius: var(--radius);
      font-size: 13px; line-height: 1.7; margin-bottom: 20px;
    }
    .banner.error  { background: rgba(255,71,87,.12); border: 1px solid rgba(255,71,87,.3); color: #ff8a94; }
    .banner.info   { background: rgba(0,255,135,.08); border: 1px solid rgba(0,255,135,.25); color: var(--green); }
    .banner.warn   { background: rgba(255,215,0,.08); border: 1px solid rgba(255,215,0,.25); color: #ffd700; }
    .banner.visible { display: block; }
    .banner code { background: rgba(255,255,255,.08); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .banner a { color: inherit; }

    .cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 28px; }
    @media(max-width:700px){ .cards { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--dim); margin-bottom: 10px; }
    .card-value { font-size: 36px; font-weight: 700; letter-spacing: -1px; line-height: 1; }
    .card-unit  { font-size: 14px; font-weight: 400; color: var(--dim); margin-left: 4px; }
    .card-sub   { font-size: 11px; color: var(--dim); margin-top: 6px; }

    .charts { display: flex; flex-direction: column; gap: 20px; }

    .chart-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
    }
    .chart-title { font-size: 13px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 16px; }
    .chart-title span { color: var(--white); }
    .chart-wrap { position: relative; height: 180px; }

    /* Stryd embed fallback */
    .stryd-embed-wrap {
      display: none;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      margin-top: 20px;
    }
    .stryd-embed-wrap.visible { display: block; }
    .stryd-embed-wrap iframe {
      width: 100%; height: 520px; border: none;
      background: #fff;
    }
    .stryd-embed-label {
      font-size: 11px; color: var(--dim); text-transform: uppercase;
      letter-spacing: .7px; padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface3);
    }

    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface3); border: 1px solid var(--border); color: var(--white);
      padding: 12px 22px; border-radius: 30px; font-size: 13px; font-weight: 500;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 100; white-space: nowrap; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Running <span>Metrics</span></h1>
    <div class="last-updated" id="last-updated">Loading…</div>
  </div>
  <div class="header-right">
    <div class="poll-indicator">
      <div class="poll-dot" id="poll-dot"></div>
      <span id="poll-label">Syncing…</span>
    </div>
    <button class="btn btn-ghost" id="refresh-btn">Refresh</button>
  </div>
</header>

<main>
  <div class="banner" id="banner"></div>

  <!-- Summary cards -->
  <div class="cards">
    <div class="card">
      <div class="card-label">Speed</div>
      <div class="card-value" id="val-speed">—<span class="card-unit">m/s</span></div>
      <div class="card-sub" id="sub-speed"></div>
    </div>
    <div class="card">
      <div class="card-label">Ground Contact Time</div>
      <div class="card-value" id="val-gct">—<span class="card-unit">ms</span></div>
      <div class="card-sub" id="sub-gct"></div>
    </div>
    <div class="card">
      <div class="card-label">Stride Length</div>
      <div class="card-value" id="val-stride">—<span class="card-unit">m</span></div>
      <div class="card-sub" id="sub-stride"></div>
    </div>
  </div>

  <!-- Charts (shown when history is available) -->
  <div id="charts-section" class="charts" style="display:none">
    <div class="chart-card">
      <div class="chart-title"><span>Speed</span> history · m/s</div>
      <div class="chart-wrap"><canvas id="chart-speed"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title"><span>Ground Contact Time</span> history · ms</div>
      <div class="chart-wrap"><canvas id="chart-gct"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title"><span>Stride Length</span> history · m</div>
      <div class="chart-wrap"><canvas id="chart-stride"></canvas></div>
    </div>
  </div>

  <!-- Stryd embed fallback -->
  <div class="stryd-embed-wrap" id="embed-wrap">
    <div class="stryd-embed-label">Stryd Activity · stryd.pro/9987769388</div>
    <iframe id="stryd-iframe" src="about:blank" loading="lazy"
            sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
  </div>
</main>

<div id="toast"></div>

<script>
'use strict';

const SHARE_URL      = 'https://stryd.pro/9987769388';
const POLL_MS        = 10 * 60 * 1000; // 10 minutes
const LS_HISTORY     = 'stryd_history';

let charts = {};
let pollTimer = null;

// ── DOM ───────────────────────────────────────────────────────
const $banner     = document.getElementById('banner');
const $pollDot    = document.getElementById('poll-dot');
const $pollLabel  = document.getElementById('poll-label');
const $lastUpd    = document.getElementById('last-updated');
const $refreshBtn = document.getElementById('refresh-btn');
const $embedWrap  = document.getElementById('embed-wrap');
const $iframe     = document.getElementById('stryd-iframe');
const $charts     = document.getElementById('charts-section');

// ── Utilities ─────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function banner(msg, type = 'error') {
  $banner.innerHTML = msg;
  $banner.className = `banner ${type} visible`;
}

function setCard(id, value, unit, sub, decimals = 2) {
  const el = document.getElementById(`val-${id}`);
  el.innerHTML = value != null
    ? `${(+value).toFixed(decimals)}<span class="card-unit">${unit}</span>`
    : `—<span class="card-unit">${unit}</span>`;
  document.getElementById(`sub-${id}`).textContent = sub || '';
}

function now() {
  return new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}

// ── Data extraction ───────────────────────────────────────────
// Tries to pull metrics out of the raw HTML string returned by the page.
// Stryd's web app typically embeds Next.js __NEXT_DATA__ or a similar
// JSON blob in a <script> tag.
function extractFromHtml(html) {
  const parser = new DOMParser();
  const doc    = parser.parseFromString(html, 'text/html');

  // Strategy 1: Next.js __NEXT_DATA__ script tag
  const nextScript = doc.getElementById('__NEXT_DATA__');
  if (nextScript) {
    try {
      const nd = JSON.parse(nextScript.textContent);
      return findMetrics(nd);
    } catch {}
  }

  // Strategy 2: any <script> tag containing "averageSpeed"
  for (const s of doc.querySelectorAll('script')) {
    const t = s.textContent;
    if (t.includes('averageSpeed') || t.includes('groundContactTime') || t.includes('strideLength')) {
      // Pull first JSON object containing those keys
      const m = t.match(/\{[\s\S]*?"(?:averageSpeed|groundContactTime|strideLength)"[\s\S]*?\}/);
      if (m) {
        try { return findMetrics(JSON.parse(m[0])); } catch {}
      }
      // Try window.* = {...} assignment
      const assign = t.match(/(?:window\.\w+\s*=\s*)(\{[\s\S]+?\});/);
      if (assign) {
        try { return findMetrics(JSON.parse(assign[1])); } catch {}
      }
    }
  }

  return null;
}

// Recursively walks any object looking for the three key metrics.
function findMetrics(obj, depth = 0) {
  if (!obj || typeof obj !== 'object' || depth > 12) return null;

  // Direct hit at this level
  const keys = Object.keys(obj);
  const hasSpeed  = keys.some(k => /speed/i.test(k));
  const hasGct    = keys.some(k => /ground|gct|contact/i.test(k));
  const hasStride = keys.some(k => /stride/i.test(k));

  if (hasSpeed || hasGct || hasStride) {
    const result = {};

    // Speed — look for m/s or pace-related keys
    for (const k of keys) {
      const lk = k.toLowerCase();
      if (/avgspeed|averagespeed|avg_speed|speed/.test(lk) && obj[k] != null) {
        const v = +obj[k];
        // Stryd speed is in m/s (typical range 2–6 m/s)
        if (v > 0 && v < 15) { result.speed = v; break; }
        // Pace in min/km? convert: pace(s/m) → speed(m/s)
        if (v > 100) { result.speed = 1000 / v; break; }
      }
    }

    for (const k of keys) {
      const lk = k.toLowerCase();
      if (/ground|gct|contact/.test(lk) && obj[k] != null) {
        result.gct = +obj[k];
        break;
      }
    }

    for (const k of keys) {
      const lk = k.toLowerCase();
      if (/stride/.test(lk) && obj[k] != null) {
        result.stride = +obj[k];
        break;
      }
    }

    if (result.speed != null || result.gct != null || result.stride != null) return result;
  }

  // Recurse into children
  for (const k of keys) {
    if (Array.isArray(obj[k])) {
      for (const item of obj[k]) {
        const r = findMetrics(item, depth + 1);
        if (r) return r;
      }
    } else if (obj[k] && typeof obj[k] === 'object') {
      const r = findMetrics(obj[k], depth + 1);
      if (r) return r;
    }
  }
  return null;
}

// ── Charts ────────────────────────────────────────────────────
const CHART_BASE = {
  responsive: true, maintainAspectRatio: false,
  animation: { duration: 400 },
  interaction: { mode: 'index', intersect: false },
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: '#1E1E1E', borderColor: '#2A2A2A', borderWidth: 1,
      titleColor: '#888', bodyColor: '#FFF', padding: 10, callbacks: {}
    }
  },
  scales: {
    x: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { color: '#888', font: { size: 11 }, maxRotation: 0 } },
    y: { grid: { color: 'rgba(255,255,255,.06)' }, ticks: { color: '#888', font: { size: 11 } } }
  }
};

function makeChart(id, color, unit, decimals) {
  const ctx = document.getElementById(id).getContext('2d');
  const cfg = JSON.parse(JSON.stringify(CHART_BASE));
  cfg.plugins.tooltip.callbacks.label = c => ` ${c.parsed.y.toFixed(decimals)} ${unit}`;
  cfg.scales.y.ticks.callback = v => v.toFixed(decimals);
  return new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [{ data: [], borderColor: color, backgroundColor: color + '18',
      borderWidth: 2, pointRadius: 4, pointHoverRadius: 6, pointBackgroundColor: color,
      tension: 0.35, fill: true }] },
    options: cfg
  });
}

function initCharts() {
  charts.speed  = makeChart('chart-speed',  '#00FF87', 'm/s', 2);
  charts.gct    = makeChart('chart-gct',    '#4A90E2', 'ms',  0);
  charts.stride = makeChart('chart-stride', '#FFD700', 'm',   2);
}

function pushToHistory(metrics) {
  const history = JSON.parse(localStorage.getItem(LS_HISTORY) || '[]');
  const entry   = { ts: Date.now(), ...metrics };
  // Avoid exact duplicates
  const last = history[history.length - 1];
  if (last && last.speed === entry.speed && last.gct === entry.gct && last.stride === entry.stride) return history;
  history.push(entry);
  if (history.length > 20) history.splice(0, history.length - 20);
  localStorage.setItem(LS_HISTORY, JSON.stringify(history));
  return history;
}

function renderHistory(history) {
  if (history.length < 2) return;
  $charts.style.display = 'flex';
  const labels = history.map(h => new Date(h.ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
  const update = (chart, key) => {
    chart.data.labels = labels;
    chart.data.datasets[0].data = history.map(h => h[key] ?? null);
    chart.update();
  };
  update(charts.speed,  'speed');
  update(charts.gct,    'gct');
  update(charts.stride, 'stride');
}

// ── Main fetch ────────────────────────────────────────────────
async function fetchData() {
  $pollDot.classList.add('active');
  $pollLabel.textContent = 'Fetching…';

  try {
    const res = await fetch(SHARE_URL, {
      headers: {
        'Accept': 'text/html,application/xhtml+xml',
        'Cache-Control': 'no-cache'
      }
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const html    = await res.text();
    const metrics = extractFromHtml(html);

    if (metrics && (metrics.speed != null || metrics.gct != null || metrics.stride != null)) {
      // Got data — update cards
      $banner.className = 'banner';
      $embedWrap.classList.remove('visible');

      const runLabel = `From stryd.pro/9987769388`;
      setCard('speed',  metrics.speed,  'm/s', runLabel, 2);
      setCard('gct',    metrics.gct,    'ms',  runLabel, 0);
      setCard('stride', metrics.stride, 'm',   runLabel, 2);

      const history = pushToHistory(metrics);
      renderHistory(history);

      $lastUpd.textContent = `Last updated ${now()}`;
      $pollLabel.textContent = 'Polling every 10m';
      toast('Data updated!');
    } else {
      // Page loaded but we couldn't parse metrics out of it —
      // fall back to embedding the Stryd page in an iframe
      showEmbedFallback('Page fetched but metrics not found in page data. Showing embedded view below.');
    }

  } catch (err) {
    const isCors = err.name === 'TypeError' || err.message.includes('Failed to fetch') || err.message.includes('NetworkError');

    if (isCors) {
      // CORS blocked — show the page in an iframe (works for public pages)
      showEmbedFallback();
    } else {
      banner(`Error fetching data: ${err.message}`, 'error');
      $pollLabel.textContent = 'Retry in 10m';
    }
  } finally {
    $pollDot.classList.remove('active');
  }
}

function showEmbedFallback(msg) {
  if (msg) {
    banner(msg, 'warn');
  } else {
    banner(
      `Direct API access is blocked by Stryd (CORS). Showing the live page below instead.<br>` +
      `To extract raw metric values automatically, a small server-side proxy would be needed.`,
      'warn'
    );
  }

  // Load the Stryd page in the iframe — this works because iframes bypass CORS
  if ($iframe.src === 'about:blank') {
    $iframe.src = SHARE_URL;
  }
  $embedWrap.classList.add('visible');
  $lastUpd.textContent = `Embedded live · ${now()}`;
  $pollLabel.textContent = 'Embedded view';
}

// ── Polling ───────────────────────────────────────────────────
function startPolling() {
  pollTimer = setInterval(fetchData, POLL_MS);
}

// ── Init ──────────────────────────────────────────────────────
function init() {
  initCharts();

  // Restore cached history immediately
  const history = JSON.parse(localStorage.getItem(LS_HISTORY) || '[]');
  if (history.length > 0) {
    const last = history[history.length - 1];
    setCard('speed',  last.speed,  'm/s', 'Cached — refreshing…', 2);
    setCard('gct',    last.gct,    'ms',  'Cached — refreshing…', 0);
    setCard('stride', last.stride, 'm',   'Cached — refreshing…', 2);
    renderHistory(history);
  }

  fetchData();
  startPolling();

  $refreshBtn.addEventListener('click', () => { fetchData(); toast('Refreshing…'); });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
